# Server
server.port=${PORT:8081}
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false
server.error.whitelabel.enabled=false

# App
spring.application.name=spring-products-api
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.open-in-view=false

# Database (override with env vars in production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/productsdb}
spring.datasource.username=${DB_USERNAME:products}
spring.datasource.password=${DB_PASSWORD:products123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false

# Logging (no SQL values in prod)
logging.level.root=INFO
logging.level.com.formation=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF

# OpenAPI / Swagger (keep docs endpoint, hide UI in prod by default)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
